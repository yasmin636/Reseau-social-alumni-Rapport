<!DOCTYPE html>
<html>
<head>
<title>Connexion</title>

<style>

body{
    font-family: Arial;
    background-color: #f2f2f2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:320px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    color:#5a7f2c;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#8BC34A;
    border:none;
    color:white;
    border-radius:5px;
    font-size:16px;
}

button:hover{
    background:#7cb342;
}

a{
    color:#8BC34A;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Connexion</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Nom utilisateur">

<input type="password" name="password" placeholder="Mot de passe">

<button type="submit">Se connecter</button>

</form>

<p>Pas de compte ? <a href="/register">S'inscrire</a></p>

</div>

</body>
</html>
