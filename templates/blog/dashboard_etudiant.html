<!DOCTYPE html>
<html>
<head>
<title>Dashboard Étudiant</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f5f5;
}

.sidebar{
height:100vh;
background:#2f4f6f;
color:white;
padding:20px;
}

.sidebar a{
color:white;
display:block;
margin:10px 0;
text-decoration:none;
}

.top{
background:#2f4f6f;
color:white;
padding:10px;
}

.card{
margin-top:15px;
}

</style>

</head>


<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-2 sidebar">

<h4>Espace Étudiant</h4>

<a href="#">Dashboard</a>
<a href="{% url 'offres' %}">Offres de stage</a>
<a href="{% url 'favoris' %}">Favoris</a>
<a href="{% url 'notifications' %}">Notifications</a>
<a href="#">Profil</a>

</div>


<!-- CONTENT -->

<div class="col-10">

<div class="top">
Bienvenue Étudiant {{ user.username }} 👋
</div>


<div class="row mt-3">

<div class="col-md-4">
<div class="card p-3">

<h5>Consulter les offres</h5>

<a href="{% url 'offres' %}" class="btn btn-primary">
Voir les offres
</a>

</div>
</div>


<div class="col-md-4">
<div class="card p-3">

<h5>Mes favoris</h5>

<a href="{% url 'favoris' %}" class="btn btn-success">
Voir favoris
</a>

</div>
</div>


<div class="col-md-4">
<div class="card p-3">

<h5>Notifications</h5>

<a href="{% url 'notifications' %}" class="btn btn-warning">
Voir notifications
</a>

</div>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
