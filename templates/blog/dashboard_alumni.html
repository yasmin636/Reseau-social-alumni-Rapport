<!DOCTYPE html>
<html>
<head>
<title>Dashboard Alumni</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f5f5;
}

.sidebar{
height:100vh;
background:#4b6f2f;
color:white;
padding:20px;
}

.sidebar a{
color:white;
display:block;
margin:10px 0;
text-decoration:none;
}

.top{
background:#4b6f2f;
color:white;
padding:10px;
}

.card{
margin-top:15px;
}

</style>

</head>


<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-2 sidebar">

<h4>Espace Alumni</h4>

<a href="#">Dashboard</a>
<a href="{% url 'post_create' %}">Publier un post</a>
<a href="{% url 'offres' %}">Publier une offre</a>
<a href="{% url 'notifications' %}">Notifications</a>
<a href="#">Profil</a>

</div>


<!-- CONTENT -->

<div class="col-10">

<div class="top">
Bienvenue Alumni {{ user.username }} 👋
</div>


<div class="row mt-3">

<div class="col-md-4">
<div class="card p-3">

<h5>Publier un post</h5>

<a href="{% url 'post_create' %}" class="btn btn-success">
Créer Post
</a>

</div>
</div>


<div class="col-md-4">
<div class="card p-3">

<h5>Publier une offre</h5>

<a href="{% url 'offres' %}" class="btn btn-primary">
Publier Offre
</a>

</div>
</div>


<div class="col-md-4">
<div class="card p-3">

<h5>Notifications</h5>

<a href="{% url 'notifications' %}" class="btn btn-warning">
Voir Notifications
</a>

</div>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
